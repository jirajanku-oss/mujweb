<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brusičství Janků</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 85%;
        }
        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 25px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.2em;
            color: #2c3e50;
            font-weight: 600;
        }
        .status {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }
        .contact {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eaeaea;
        }
        .contact p {
            margin: 12px 0;
            font-size: 1.1em;
        }
        a {
            color: #8c202a; /* Temně červená z loga */
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #3a5c3a; /* Temně zelená z loga */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo Brusičství Janků" class="logo">
        
        <h1>Brusičství Janků</h1>
        <p class="status">Na stránkách momentálně pracujeme.</p>
        
        <div class="contact">
            <p>✉️ <a href="mailto:jiri@jankustones.com">jiri@jankustones.com</a></p>
            <p>📞 <a href="tel:+420727993899">727 99 38 99</a></p>
        </div>
    </div>

</body>
</html>
